    />

    <link rel="canonical" href="https://www.ayahday.cc/" />

      rel="stylesheet"
    />
    <link rel="stylesheet" href="./dist/app.css" />
    <style>
      .lang-menu {
        position: relative;
      }

      .lang-trigger {
        min-width: 7rem;
        height: 2.5rem;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        border-radius: 0.5rem;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(2, 6, 23, 0.65);
        color: rgba(241, 245, 249, 0.95);
        padding: 0 0.65rem;
        font-size: 0.85rem;
        font-weight: 600;
        line-height: 1;
        backdrop-filter: blur(10px);
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          background-color 0.2s ease;
      }

      .lang-trigger:hover {
        border-color: rgba(148, 163, 184, 0.55);
        background: rgba(2, 6, 23, 0.78);
      }

      .lang-trigger:focus-visible {
        outline: none;
        border-color: rgba(59, 130, 246, 0.8);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
      }

      .lang-chevron {
        width: 0.9rem;
        height: 0.9rem;
        opacity: 0.78;
        transition: transform 0.18s ease;
      }

      .lang-menu[data-open="true"] .lang-chevron {
        transform: rotate(180deg);
      }

      .lang-content {
        position: absolute;
        right: 0;
        top: calc(100% + 0.5rem);
        min-width: 100%;
        border-radius: 0.75rem;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(2, 6, 23, 0.94);
        box-shadow: 0 12px 36px rgba(2, 6, 23, 0.45);
        padding: 0.3rem;
        z-index: 40;
      }

      .lang-content[hidden] {
        display: none;
      }

      .lang-option {
        width: 100%;
        border: 0;
        border-radius: 0.55rem;
        text-align: left;
        background: transparent;
        color: rgba(226, 232, 240, 0.95);
        padding: 0.48rem 0.55rem;
        font-size: 0.85rem;
        font-weight: 500;
        line-height: 1.2;
      }

      .lang-option:hover,
      .lang-option:focus-visible {
        outline: none;
        background: rgba(51, 65, 85, 0.48);
        color: rgba(248, 250, 252, 0.98);
      }

      .lang-option[data-active="true"] {
        background: rgba(30, 64, 175, 0.35);
        color: rgba(239, 246, 255, 0.98);
      }

      .whats-new-sparkle {
        animation: whats-new-float 2.2s ease-in-out infinite;
      }

      @keyframes whats-new-float {
        0% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-2px) scale(1.08);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }

      /* Boot overlay: visible before app.css/JS so first paint isn’t janky */
      #appBootOverlay.app-boot-overlay {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: radial-gradient(
          circle at top,
          #0f172a,
          #020617 60%
        );
        transition:
          opacity 0.4s ease,
          visibility 0.4s ease;
      }

      #appBootOverlay.app-boot-overlay--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-boot-overlay__inner {
        text-align: center;
      }

      .app-boot-overlay__mark {
        font-family:
          "Mulish",
          system-ui,
          sans-serif;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #7dd3fc;
      }

      .app-boot-overlay__spinner {
        width: 2rem;
        height: 2rem;
        margin: 1.1rem auto 0;
        border: 2px solid rgba(148, 163, 184, 0.28);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: app-boot-spin 0.72s linear infinite;
      }

      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "AyahDay",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "url": "https://www.ayahday.cc/",
        "description": "Daily Quranic verses (ayah) in English, Urdu, and Malay for reflection and sharing. Free web app using Al Quran Cloud.",
        "featureList": "Daily ayah reflection, English, Urdu, and Malay Quran translations, WhatsApp sharing, Al Quran Cloud API",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "PKR"
        },
        "publisher": {
          "@type": "Organization",
          "name": "AyahDay",
          "url": "https://www.ayahday.cc/"
        }
      }

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-72MT997T35"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);

      gtag("js", new Date());
      gtag("config", "G-72MT997T35");

  </head>
  <body
    class="min-h-screen bg-[radial-gradient(circle_at_top,_#0f172a,_#020617_60%)] p-4 md:p-8"
  >
    <div
      id="appBootOverlay"
      class="app-boot-overlay"
      role="progressbar"
      aria-valuemin="0"
      aria-valuemax="100"
      aria-busy="true"
      aria-label="Loading AyahDay"
    >
      <div class="app-boot-overlay__inner">
        <div class="app-boot-overlay__mark">AyahDay</div>
        <div class="app-boot-overlay__spinner"></div>
      </div>
    </div>
    <div class="theme mx-auto w-full max-w-2xl">
      <header class="mb-8">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <h1
              class="element-to-hide font-logo text-2xl tracking-tight text-gradient-solar sm:text-3xl"
              id="gradientLogo"
            >
              AyahDay
            </h1>
            <p
              class="element-to-hide mt-0.5 text-xs font-medium text-solar-gold"
              id="tagline"
            >
              Daily Quranic verses in English, Urdu &amp; Malay
            </p>
            <h1
              id="screenshotLogo"
              class="hidden font-logo text-2xl font-extrabold text-white"
            >
              <span class="text-solar-green-400">AyahDay.cc</span>
              <span class="mt-1 block text-base font-bold text-solar-blue-300">
                Daily Quranic Verses
              </span>
            </h1>
          </div>
        </div>
      </header>

      <main>
        <div class="mb-3 flex items-center justify-between gap-3">
          <div
            id="datetime"
            class="text-sm font-medium text-solar-slate-400"
          ></div>
          <p
            id="swipeInstruction"
            class="element-to-hide flex items-center gap-1.5 text-sm text-slate-400"
          >
            <span class="material-symbols-outlined text-base" aria-hidden="true"
              >swipe</span
            >
            Swipe left or right
          </p>
        </div>
        <div
          id="whatsNewNotice"
          class="element-to-hide mb-4 rounded-xl border border-cyan-300/30 bg-cyan-500/10 p-4 text-cyan-100"
          role="status"
          hidden
        >
          <div class="flex items-start justify-between gap-3">
            <div class="flex items-start gap-3">
              <span
                class="material-symbols-outlined whats-new-sparkle mt-0.5 shrink-0 text-3xl text-cyan-200"
                aria-hidden="true"
              >
                auto_awesome
              </span>
              <div>
                <p id="whatsNewTitle" class="text-base font-semibold">
                  What's New
                </p>
                <p id="whatsNewMessage" class="mt-1 text-sm text-cyan-100/90">
                  New: Added Malay translation (ms.basmeih) in Language menu.
                </p>
              </div>
            </div>
            <button
              type="button"
              id="closeWhatsNewBtn"
              class="btn-icon h-8 w-8 border-cyan-300/40 bg-cyan-500/10 text-cyan-100 hover:bg-cyan-500/20"
              aria-label="Close What's New"
              title="Close What's New"
            >
              <i class="fa-solid fa-xmark text-sm" aria-hidden="true"></i>
            </button>
          </div>
        </div>
        <div
          id="verseDisplay"
          class="ayah-day-verse-panel glass-card mb-6 flex flex-col justify-center rounded-xl p-4 text-card-foreground ring-1 ring-solar-blue-500/25 md:p-5"
        ></div>
        <div
          class="element-to-hide flex w-full flex-wrap items-center justify-between gap-3"
        >
          <div class="flex flex-wrap gap-2" dir="ltr" lang="en">
            <span class="element-to-hide relative inline-flex">
              <button
                type="button"
                id="shareBtn"
                class="btn-icon-whatsapp"
                aria-describedby="shareTooltip"
                aria-label="Share on WhatsApp"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="size-4 shrink-0"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="#ffffff"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <!-- Lucide MessageCircle (ISC) - matches solar-helper ResultsSidebar -->
                  <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />
                </svg>
              </button>
              <div
                id="shareTooltip"
                role="tooltip"
                class="share-tooltip element-to-hide"
              >
                <span id="shareTooltipLabel">Share on WhatsApp</span>
              </div>
            </span>
            <button
              type="button"
              id="prevBtn"
              class="btn-icon"
              aria-label="Previous verse"
            >
              <i class="fa-solid fa-caret-left" aria-hidden="true"></i>
            </button>
            <button
              type="button"
              id="nextBtn"
              class="btn-icon"
              aria-label="Next verse"
            >
              <i class="fa-solid fa-caret-right" aria-hidden="true"></i>
            </button>
          </div>
          <div class="lang-menu" id="language-menu" data-open="false">
            <button
              type="button"
              id="language-trigger"
              class="lang-trigger"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="language-menu-content"
              aria-label="Select translation language"
            >
              <span id="language-trigger-label">English</span>
              <svg
                class="lang-chevron"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M6 9L12 15L18 9"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <div
              id="language-menu-content"
              class="lang-content"
              role="menu"
              hidden
            >
              <button
                type="button"
                class="lang-option"
                role="menuitemradio"
                data-language="en.asad"
                aria-checked="false"
              >
                English
              </button>
              <button
                type="button"
                class="lang-option"
                role="menuitemradio"
                data-language="ur.maududi"
                aria-checked="false"
              >
                Urdu
              </button>
              <button
                type="button"
                class="lang-option"
                role="menuitemradio"
                data-language="ms.basmeih"
                aria-checked="false"
              >
                Malay
              </button>
            </div>
          </div>
        </div>
      </main>

      <footer
        class="mt-10 border-t border-white/10 pt-4 text-left text-xs text-slate-400"
      >
        <p style="margin-bottom: 4px">
          © <span id="footerYear"></span> AyahDay
        </p>
        <p
          class="mt-2 text-slate-400/70"
          style="font-size: 11px; margin-bottom: 4px"
        >
          Help me improve AyahDay. Share feedback!
        </p>
        <div
          class="mt-2 flex flex-wrap items-center gap-2 text-xs text-slate-300"
        >
          <a
            href="./faq/"
            class="underline underline-offset-2 hover:text-cyan-200"
            style="text-decoration: underline; text-underline-offset: 2px"
            >FAQ</a
          >
          <span class="text-slate-500" aria-hidden="true">•</span>
          <button
            type="button"
            class="underline underline-offset-2 hover:text-cyan-200"
            aria-label="Share your feedback"
            title="Share your feedback"
            data-tally-open="xXR2ek"
            data-tally-hide-title="1"
            data-tally-overlay="1"
            data-tally-emoji-text="🕋"
            data-tally-emoji-animation="heart-beat"
            data-tally-auto-close="0"
            data-tally-form-events-forwarding="1"
            style="text-decoration: underline; text-underline-offset: 2px"
          >
            Feedback
          </button>
        </div>
      </footer>
    </div>

    <!-- Off-screen DOM for html2canvas (logo, date, verse, controls, custom footer). -->
    <div
      id="shareSnapshotStage"
      class="share-snapshot-stage"
      aria-hidden="true"
    >
      <div id="shareSnapshotContent"></div>
    </div>

    <script>
      document.getElementById("footerYear").textContent =
        new Date().getFullYear();
    </script>
    <script src="script.js"></script>
  </body>
</html>
